<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İstanbul Sende</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f2f2f2;
}

.header {
    background: linear-gradient(to right, #00c6ff, #0072ff);
    color: white;
    text-align: center;
    padding: 20px;
    font-size: 24px;
    font-weight: bold;
}

.container {
    padding: 15px;
}

.btn {
    display: block;
    width: 100%;
    padding: 15px;
    margin: 10px 0;
    background: #7a4528;
    color: white;
    border: none;
    border-radius: 25px;
    font-size: 18px;
}

iframe {
    width: 100%;
    height: 500px;
    border: none;
    margin-top: 15px;
    border-radius: 15px;
}
</style>

<script>
function showTrafficMap() {
    document.getElementById("content").innerHTML =
    `<iframe src="https://maps.google.com/maps?q=istanbul&output=embed"></iframe>`;
}

function showTrafficDensity() {
    document.getElementById("content").innerHTML =
    `<iframe src="https://uym.ibb.gov.tr/trafik/"></iframe>`;
}

function showMobese() {
    document.getElementById("content").innerHTML =
    `<iframe src="https://uym.ibb.gov.tr/yharita6/"></iframe>`;
}
</script>

</head>

<body>

<div class="header">İstanbul Sende</div>

<div class="container">

<button class="btn">Günlük Hayat</button>
<button class="btn">Ulaşım</button>
<button class="btn">Gezilecek Yerler</button>
<button class="btn">Acil İletişim</button>

<button class="btn" onclick="showTrafficMap()">Trafik Haritası</button>

<button class="btn" onclick="showTrafficDensity()">
Canlı Trafik (Yoğunluk)
</button>

<!-- ✅ YENİ BUTON -->
<button class="btn" onclick="showMobese()">
Canlı Kameralar (MOBESE)
</button>

<div id="content"></div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İstanbul Sende</title>

<style>
body {
    font-family: Arial;
    background: #f2f2f2;
    text-align: center;
}

.header {
    background: linear-gradient(to right, #00c6ff, #0072ff);
    color: white;
    padding: 20px;
    font-size: 24px;
    border-radius: 0 0 20px 20px;
}

button {
    width: 85%;
    padding: 15px;
    margin: 10px;
    border: none;
    border-radius: 25px;
    background: #8B4513;
    color: white;
    font-size: 16px;
}

.back {
    background: #333;
}
</style>

<script>
function git(link){
    window.location.href = link;
}

function harita(q){
    window.location.href = "https://www.google.com/maps/search/?api=1&query=" + q;
}

function sayfa(secim){

let alan = document.getElementById("icerik");

if(secim=="gunluk"){
alan.innerHTML = `
<button onclick="git('https://www.google.com/maps/search/nöbetçi+eczane+istanbul')">Nöbetçi Eczaneler Harita</button>
<button onclick="git('https://www.turkiye.gov.tr/saglik-bakanligi-nobetci-eczane-sorgulama')">Nöbetçi Eczaneler</button>
<button onclick="git('https://www.mgm.gov.tr/tahmin/il-ve-ilceler.aspx?il=Istanbul')">Hava Durumu</button>

<button class="back" onclick="anasayfa()">← Geri</button>
`;
}

if(secim=="ulasim"){
alan.innerHTML = `
<button onclick="git('https://iett.istanbul/')">İETT Otobüs Saatleri</button>
<button onclick="git('https://www.metro.istanbul/Home/Index')">Metro Saatleri</button>

<button class="back" onclick="anasayfa()">← Geri</button>
`;
}

if(secim=="trafik"){
alan.innerHTML = `
<button onclick="git('https://uym.ibb.gov.tr/yharita6/')">Canlı Trafik Yoğunluk</button>
<button onclick="git('https://uym.ibb.gov.tr/')">Trafik Haritası</button>
<button onclick="git('https://www.ibb.istanbul/tr-TR/duyurular')">İBB Trafik Duyuruları</button>

<button class="back" onclick="anasayfa()">← Geri</button>
`;
}

if(secim=="belediye"){
alan.innerHTML = `
<button onclick="git('https://www.turkiye.gov.tr/')">E-Devlet Giriş</button>
<button onclick="git('https://ivd.gib.gov.tr/')">Vergi & Ceza</button>

<button class="back" onclick="anasayfa()">← Geri</button>
`;
}

if(secim=="gezilecek"){
alan.innerHTML = `
<button onclick="harita('Ayasofya')">Ayasofya</button>
<button onclick="harita('Topkapı Sarayı')">Topkapı Sarayı</button>
<button onclick="harita('Dolmabahçe Sarayı')">Dolmabahçe Sarayı</button>
<button onclick="harita('Galata Kulesi')">Galata Kulesi</button>
<button onclick="harita('Yerebatan Sarnıcı')">Yerebatan Sarnıcı</button>
<button onclick="harita('İstanbul Arkeoloji Müzesi')">Arkeoloji Müzesi</button>
<button onclick="harita('Rahmi Koç Müzesi')">Rahmi Koç Müzesi</button>
<button onclick="harita('Miniatürk')">Miniatürk</button>
<button onclick="harita('Panorama 1453')">Panorama 1453</button>
<button onclick="harita('Pera Müzesi')">Pera Müzesi</button>
<button onclick="harita('Sakıp Sabancı Müzesi')">Sabancı Müzesi</button>
<button onclick="harita('İstanbul Modern')">İstanbul Modern</button>
<button onclick="harita('Kız Kulesi')">Kız Kulesi</button>
<button onclick="harita('Pierre Loti Tepesi')">Pierre Loti</button>
<button onclick="harita('Emirgan Korusu')">Emirgan Korusu</button>
<button onclick="harita('Gülhane Parkı')">Gülhane Parkı</button>

<button class="back" onclick="anasayfa()">← Geri</button>
`;
}

}

function anasayfa(){
document.getElementById("icerik").innerHTML = `
<button onclick="sayfa('gunluk')">Günlük Hayat</button>
<button onclick="sayfa('ulasim')">Ulaşım</button>
<button onclick="sayfa('trafik')">Trafik Durumu</button>
<button onclick="sayfa('belediye')">Belediye Hizmetleri</button>
<button onclick="sayfa('gezilecek')">Gezilecek Yerler</button>
`;
}
</script>

</head>

<body>

<div class="header">İstanbul Sende</div>

<div id="icerik">
<button onclick="sayfa('gunluk')">Günlük Hayat</button>
<button onclick="sayfa('ulasim')">Ulaşım</button>
<button onclick="sayfa('trafik')">Trafik Durumu</button>
<button onclick="sayfa('belediye')">Belediye Hizmetleri</button>
<button onclick="sayfa('gezilecek')">Gezilecek Yerler</button>
</div>

</body>
</html>

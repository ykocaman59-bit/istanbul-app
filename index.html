<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İstanbul Sende</title>

<style>
body {
    font-family: Arial;
    background: #f2f2f2;
    text-align: center;
}

.header {
    background: linear-gradient(to right, #00c6ff, #0072ff);
    color: white;
    padding: 20px;
    font-size: 24px;
    border-radius: 0 0 20px 20px;
}

button {
    width: 85%;
    padding: 15px;
    margin: 10px;
    border: none;
    border-radius: 25px;
    background: #8B4513;
    color: white;
    font-size: 16px;
}

.back {
    background: #333;
}

.acil {
    background: red;
}
</style>

<script>
function git(link){
    window.location.href = link;
}

/* 🔥 DÜZELTİLDİ: direkt HARİTA açar */
function harita(q){
    window.location.href = "https://www.google.com/maps?q=" + encodeURIComponent(q);
}

function sayfa(secim){

let alan = document.getElementById("icerik");

if(secim=="gunluk"){
alan.innerHTML = `
<button onclick="git('https://www.turkiye.gov.tr/saglik-bakanligi-nobetci-eczane-sorgulama')">Nöbetçi Eczaneler</button>
<button onclick="git('https://www.google.com/maps/search/nöbetçi+eczane+istanbul')">Nöbetçi Eczane Harita</button>
<button onclick="git('https://www.mgm.gov.tr/tahmin/il-ve-ilceler.aspx?il=Istanbul')">Hava Durumu</button>

<button class="back" onclick="anasayfa()">← Geri</button>
`;
}

if(secim=="ulasim"){
alan.innerHTML = `
<button onclick="git('https://iett.istanbul/')">İETT</button>
<button onclick="git('https://www.metro.istanbul/Home/Index')">Metro</button>

<button class="back" onclick="anasayfa()">← Geri</button>
`;
}

if(secim=="trafik"){
alan.innerHTML = `
<button onclick="git('https://uym.ibb.gov.tr/yharita6/')">Canlı Trafik</button>
<button onclick="git('https://uym.ibb.gov.tr/')">Trafik Haritası</button>
<button onclick="git('https://www.ibb.istanbul/')">İBB Duyurular</button>

<button class="back" onclick="anasayfa()">← Geri</button>
`;
}

if(secim=="belediye"){
alan.innerHTML = `
<button onclick="git('https://www.turkiye.gov.tr/')">E-Devlet</button>
<button onclick="git('https://ivd.gib.gov.tr/')">Vergi & Ceza</button>

<button class="back" onclick="anasayfa()">← Geri</button>
`;
}

/* 🔥 HARİTA ARTIK DİREKT KONUM AÇAR */
if(secim=="gezilecek"){
alan.innerHTML = `
<button onclick="harita('Ayasofya İstanbul')">Ayasofya</button>
<button onclick="harita('Topkapı Sarayı İstanbul')">Topkapı Sarayı</button>
<button onclick="harita('Dolmabahçe Sarayı İstanbul')">Dolmabahçe Sarayı</button>
<button onclick="harita('Galata Kulesi İstanbul')">Galata Kulesi</button>
<button onclick="harita('Yerebatan Sarnıcı İstanbul')">Yerebatan Sarnıcı</button>
<button onclick="harita('Kız Kulesi İstanbul')">Kız Kulesi</button>
<button onclick="harita('Miniatürk İstanbul')">Miniatürk</button>
<button onclick="harita('Pierre Loti Tepesi İstanbul')">Pierre Loti</button>
<button onclick="harita('Emirgan Korusu İstanbul')">Emirgan Korusu</button>
<button onclick="harita('Gülhane Parkı İstanbul')">Gülhane Parkı</button>

<button class="back" onclick="anasayfa()">← Geri</button>
`;
}

/* ✅ ACİL İLETİŞİM GERİ GELDİ */
if(secim=="acil"){
alan.innerHTML = `
<button class="acil" onclick="git('tel:112')">🚑 112 Ambulans</button>
<button class="acil" onclick="git('tel:155')">🚓 155 Polis</button>
<button class="acil" onclick="git('tel:110')">🚒 110 İtfaiye</button>
<button class="acil" onclick="git('tel:183')">📞 Sosyal Destek</button>

<button class="back" onclick="anasayfa()">← Geri</button>
`;
}

/* ✅ HAKKIMDA GERİ GELDİ */
if(secim=="hakkimda"){
alan.innerHTML = `
<div style="padding:20px; text-align:left;">
<h3>İstanbul Sende</h3>

<p>İstanbul Sende, İstanbul’da yaşayan bireylerin günlük ihtiyaçlarına hızlı, pratik ve güvenilir çözümler sunmak amacıyla geliştirilmiş bir dijital platformdur.</p>

<p>Bu uygulama; nöbetçi eczane, hava durumu, trafik, ulaşım ve resmi hizmetlere tek noktadan erişim sağlar.</p>

<p><b>Not:</b> Uygulama resmi kurumlara ait değildir. Sadece ilgili resmi web sitelerine yönlendirme yapar.</p>

</div>

<button class="back" onclick="anasayfa()">← Geri</button>
`;
}

}

function anasayfa(){
document.getElementById("icerik").innerHTML = `
<button onclick="sayfa('gunluk')">Günlük Hayat</button>
<button onclick="sayfa('ulasim')">Ulaşım</button>
<button onclick="sayfa('trafik')">Trafik Durumu</button>
<button onclick="sayfa('belediye')">Belediye Hizmetleri</button>
<button onclick="sayfa('gezilecek')">Gezilecek Yerler</button>
<button onclick="sayfa('acil')">Acil İletişim</button>
<button onclick="sayfa('hakkimda')">Hakkımda</button>
`;
}
</script>

</head>

<body>

<div class="header">İstanbul Sende</div>

<div id="icerik">
<button onclick="sayfa('gunluk')">Günlük Hayat</button>
<button onclick="sayfa('ulasim')">Ulaşım</button>
<button onclick="sayfa('trafik')">Trafik Durumu</button>
<button onclick="sayfa('belediye')">Belediye Hizmetleri</button>
<button onclick="sayfa('gezilecek')">Gezilecek Yerler</button>
<button onclick="sayfa('acil')">Acil İletişim</button>
<button onclick="sayfa('hakkimda')">Hakkımda</button>
</div>

</body>
</html>

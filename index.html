<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İstanbul Sende</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f2f2f2;
}

header {
    background: linear-gradient(to right, #00c6ff, #0072ff);
    color: white;
    text-align: center;
    padding: 20px;
    font-size: 22px;
}

.container {
    padding: 15px;
}

button {
    width: 100%;
    padding: 15px;
    margin: 10px 0;
    border: none;
    border-radius: 25px;
    background: #7a3e1d;
    color: white;
    font-size: 18px;
}

.back {
    background: #444;
}
</style>
</head>

<body>

<header>İstanbul Sende</header>

<div class="container" id="menu"></div>

<script>

function anaMenu() {
document.getElementById("menu").innerHTML = `
<button onclick="gunluk()">Günlük Hayat</button>
<button onclick="ulasim()">Ulaşım</button>
<button onclick="gezilecek()">Gezilecek Yerler</button>
<button onclick="acil()">Acil İletişim</button>
<button onclick="trafik()">Trafik Durumu</button>
<button onclick="maps()">Canlı Trafik (Yoğunluk)</button>
<button onclick="mobese()">Canlı Kameralar (MOBESE)</button>
<button onclick="hizmet()">Belediye Hizmetleri</button>
`;
}

function geri() {
    anaMenu();
}

function gunluk() {
document.getElementById("menu").innerHTML = `
<button onclick="eczane()">Nöbetçi Eczane</button>
<button onclick="hava()">Hava Durumu</button>
<button class="back" onclick="geri()">← Geri</button>
`;
}

function ulasim() {
document.getElementById("menu").innerHTML = `
<button onclick="window.open('https://iett.istanbul')">İETT</button>
<button onclick="window.open('https://metro.istanbul')">Metro</button>
<button class="back" onclick="geri()">← Geri</button>
`;
}

function gezilecek() {
document.getElementById("menu").innerHTML = `
<button onclick="harita('Ayasofya İstanbul')">Ayasofya</button>
<button onclick="harita('Galata Kulesi İstanbul')">Galata Kulesi</button>
<button class="back" onclick="geri()">← Geri</button>
`;
}

function acil() {
document.getElementById("menu").innerHTML = `
<button onclick="tel('112')">🚑 112 Acil</button>
<button onclick="tel('155')">👮 Polis</button>
<button class="back" onclick="geri()">← Geri</button>
`;
}

function hizmet() {
document.getElementById("menu").innerHTML = `
<button onclick="window.open('https://www.turkiye.gov.tr')">E-Devlet</button>
<button onclick="window.open('https://ivd.gib.gov.tr')">Vergi</button>
<button onclick="window.open('https://hgsmusteri.ptt.gov.tr')">HGS/OGS</button>
<button onclick="window.open('https://www.turkiye.gov.tr/egm-trafik-cezasi-sorgulama')">Ceza</button>
<button onclick="window.open('https://www.ibb.istanbul')">İBB</button>
<button onclick="window.open('https://basvuru.ibb.gov.tr')">Başvuru</button>
<button class="back" onclick="geri()">← Geri</button>
`;
}

/* DIŞ İŞLEMLER */

function harita(q) {
    window.open("https://www.google.com/maps/search/" + q);
}

function tel(numara) {
    window.location.href = "tel:" + numara;
}

function trafik() {
    window.open("https://uym.ibb.gov.tr/yharita/");
}

function maps() {
    window.open("https://www.google.com/maps");
}

function mobese() {
    window.open("https://uym.ibb.gov.tr/yharita/");
}

function eczane() {
    window.open("https://www.google.com/maps/search/nöbetçi+eczane+yakınımda");
}

function hava() {
    window.open("https://www.google.com/search?q=istanbul+hava+durumu");
}

/* BAŞLANGIÇ */
anaMenu();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İstanbul Sende</title>

<style>
body {
    font-family: Arial;
    background: #f2f2f2;
    text-align: center;
}

h1 {
    background: linear-gradient(to right, #00c6ff, #0072ff);
    color: white;
    padding: 15px;
    border-radius: 10px;
}

button {
    width: 90%;
    padding: 15px;
    margin: 10px;
    border: none;
    border-radius: 30px;
    background: #8b4513;
    color: white;
    font-size: 16px;
}

.menu {
    display: none;
}
</style>
</head>

<body>

<h1>İstanbul Sende</h1>

<!-- ANA MENÜ -->
<button onclick="toggle('gunluk')">Günlük Hayat</button>
<div id="gunluk" class="menu">
    <button onclick="go('https://www.eczaneler.gen.tr/')">Nöbetçi Eczaneler</button>
    <button onclick="go('https://www.google.com/maps/search/nöbetçi+eczane')">Nöbetçi Eczane (Harita)</button>
    <button onclick="go('https://www.mgm.gov.tr/?il=Istanbul')">Hava Durumu</button>
</div>

<button onclick="toggle('ulasim')">Ulaşım</button>
<div id="ulasim" class="menu">
    <button onclick="go('https://iett.istanbul')">İETT</button>
    <button onclick="go('https://www.metro.istanbul')">Metro</button>
</div>

<button onclick="toggle('gezilecek')">Gezilecek Yerler</button>
<div id="gezilecek" class="menu">
    <button onclick="go('https://www.google.com/maps?q=Ayasofya')">Ayasofya</button>
    <button onclick="go('https://www.google.com/maps?q=Topkapı+Sarayı')">Topkapı Sarayı</button>
    <button onclick="go('https://www.google.com/maps?q=Galata+Kulesi')">Galata Kulesi</button>
    <button onclick="go('https://www.google.com/maps?q=Dolmabahçe+Sarayı')">Dolmabahçe Sarayı</button>
    <button onclick="go('https://tr.wikipedia.org/wiki/%C4%B0stanbul%27daki_m%C3%BCzeler_listesi')">Tüm Müzeler</button>
</div>

<button onclick="toggle('acil')">Acil İletişim</button>
<div id="acil" class="menu">
    <button onclick="call('112')">112 Acil</button>
    <button onclick="call('155')">Polis</button>
</div>

<button onclick="toggle('trafik')">Trafik Durumu</button>
<div id="trafik" class="menu">
    <button onclick="go('https://www.google.com/maps/@41.0082,28.9784,10z/data=!5m1!1e1')">Canlı Trafik</button>
    <button onclick="go('https://uym.ibb.gov.tr/')">İBB Trafik</button>
    <button onclick="go('https://uym.ibb.gov.tr/anasayfa/kameralar')">Canlı MOBESE</button>
</div>

<button onclick="toggle('belediye')">Belediye Hizmetleri</button>
<div id="belediye" class="menu">
    <button onclick="go('https://www.turkiye.gov.tr/')">E-Devlet Giriş</button>
    <button onclick="go('https://www.turkiye.gov.tr/')">Vergi / HGS / Ceza</button>
    <button onclick="go('https://www.turkiye.gov.tr/icisleri-e-basvuru')">Online Başvuru</button>
    <button onclick="go('https://www.ibb.istanbul')">İBB Hizmetleri</button>
</div>

<button onclick="go('https://sites.google.com/view/istanbulsendehakkinda/ana-sayfa')">Hakkımda</button>

<script>
function toggle(id) {
    var x = document.getElementById(id);
    x.style.display = x.style.display === "block" ? "none" : "block";
}

function go(link) {
    window.location.href = link;
}

function call(num) {
    window.location.href = "tel:" + num;
}
</script>

</body>
</html>

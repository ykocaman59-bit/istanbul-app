<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İstanbul Sende</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:Poppins;
    background:#f2f4f7;
}

header{
    background:linear-gradient(135deg,#00c6ff,#0072ff);
    color:white;
    text-align:center;
    padding:20px;
    font-size:22px;
    font-weight:bold;
}

.container{
    padding:15px;
}

.btn{
    width:100%;
    padding:16px;
    margin:10px 0;
    border:none;
    border-radius:15px;
    background:#6d3b21;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.card{
    background:white;
    padding:15px;
    margin-top:10px;
    border-radius:15px;
    box-shadow:0 5px 10px rgba(0,0,0,0.1);
    display:none;
}

.place{
    background:#f8f8f8;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
}

.place button{
    margin-top:8px;
    background:#6d3b21;
    color:white;
    border:none;
    padding:10px;
    border-radius:10px;
    width:100%;
}

iframe{
    width:100%;
    height:300px;
    border:none;
    border-radius:15px;
}
</style>
</head>

<body>

<header>İstanbul Sende</header>

<div class="container">

<button class="btn" onclick="toggle('gunluk')">Günlük Hayat</button>
<div id="gunluk" class="card">
    <button class="btn" onclick="window.open('https://www.eczaneler.gen.tr/nobetci-istanbul')">Nöbetçi Eczaneler</button>
    <button class="btn" onclick="window.open('https://www.mgm.gov.tr/tahmin/il-ve-ilceler.aspx?il=Istanbul')">Hava Durumu</button>
</div>

<button class="btn" onclick="toggle('ulasim')">Ulaşım</button>
<div id="ulasim" class="card">
    <button class="btn" onclick="window.open('https://iett.istanbul')">İETT</button>
    <button class="btn" onclick="window.open('https://www.metro.istanbul')">Metro</button>
</div>

<button class="btn" onclick="toggle('gezilecek')">Gezilecek Yerler</button>
<div id="gezilecek" class="card">

<div class="place">
Ayasofya
<button onclick="openMap(41.0086,28.9802)">Konum Aç</button>
</div>

<div class="place">
Taksim Meydanı
<button onclick="openMap(41.0369,28.9850)">Konum Aç</button>
</div>

<div class="place">
Sultanahmet Camii
<button onclick="openMap(41.0055,28.9768)">Konum Aç</button>
</div>

<div class="place">
Galata Kulesi
<button onclick="openMap(41.0256,28.9744)">Konum Aç</button>
</div>

<div class="place">
Dolmabahçe Sarayı
<button onclick="openMap(41.0392,29.0006)">Konum Aç</button>
</div>

<div class="place">
Kız Kulesi
<button onclick="openMap(41.0211,29.0041)">Konum Aç</button>
</div>

<div class="place">
Kapalıçarşı
<button onclick="openMap(41.0106,28.9680)">Konum Aç</button>
</div>

</div>

<button class="btn" onclick="toggle('acil')">Acil İletişim</button>
<div id="acil" class="card">
🚑 112 - Acil<br>
🚒 110 - İtfaiye<br>
🚓 155 - Polis<br>
⚡ 186 - Elektrik<br>
🔥 177 - Orman Yangını
</div>

<button class="btn" onclick="toggle('trafik')">Trafik Durumu</button>
<div id="trafik" class="card">
<iframe src="https://www.google.com/maps?q=istanbul&output=embed"></iframe>
</div>

</div>

<script>
function toggle(id){
    let el = document.getElementById(id);
    el.style.display = (el.style.display === "block") ? "none" : "block";
}

function openMap(lat, lng){
    window.open(`https://www.google.com/maps?q=${lat},${lng}`);
}
</script>

</body>
</html>

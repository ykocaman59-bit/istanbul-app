<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İstanbul Sende</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f2f2f2;
}

.header {
    background: linear-gradient(to right, #00c6ff, #0072ff);
    color: white;
    text-align: center;
    padding: 20px;
    font-size: 24px;
    font-weight: bold;
}

.btn {
    display: block;
    width: 85%;
    margin: 15px auto;
    padding: 18px;
    background: #7b3f1d;
    color: white;
    border: none;
    border-radius: 25px;
    font-size: 18px;
    cursor: pointer;
}

/* BAŞTA GİZLİ */
iframe {
    width: 95%;
    height: 400px;
    border: none;
    margin: 20px auto;
    display: none;
    border-radius: 15px;
}
</style>

</head>

<body>

<div class="header">İstanbul Sende</div>

<button class="btn">Günlük Hayat</button>
<button class="btn">Ulaşım</button>
<button class="btn">Gezilecek Yerler</button>
<button class="btn">Acil İletişim</button>

<button class="btn" onclick="trafik()">Trafik Haritası</button>
<button class="btn" onclick="canli()">Canlı Trafik (Yoğunluk)</button>
<button class="btn" onclick="mobese()">Canlı Kameralar (MOBESE)</button>

<iframe id="harita"></iframe>

<script>

function trafik() {
    let h = document.getElementById("harita");
    h.style.display = "block";
    h.src = "https://sehirharitasi.ibb.gov.tr/";
}

function canli() {
    let h = document.getElementById("harita");
    h.style.display = "block";
    h.src = "https://uym.ibb.gov.tr/yharita6/";
}

function mobese() {
    window.open("https://uym.ibb.gov.tr/yharita6/", "_blank");
}

</script>

</body>
</html>
